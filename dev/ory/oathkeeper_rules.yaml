- id: anonymous-rest-auth
  upstream:
    url: "http://bats-tests:4012"
  match:
    url: "<(http|https)>://<[a-zA-Z0-9-.:]+>/auth/<(clearCookies|login|logout|email/code|email/login|totp/validate|email/login/cookie)>"
    methods: ["GET", "POST", "OPTIONS"]
  authenticators:
    - handler: anonymous
  authorizer:
    handler: allow
  mutators:
    - handler: noop

- id: device-login
  upstream:
    url: "http://bats-tests:4012"
  match:
    url: "<(http|https)>://<[a-zA-Z0-9-.:]+>/auth/create/device-account"
    methods: ["POST"]
  authenticators:
    - handler: jwt
      config:
        trusted_issuers:
          - https://firebaseappcheck.googleapis.com/806646140435
        target_audience:
          - projects/806646140435
        jwks_urls:
          - https://firebaseappcheck.googleapis.com/v1beta/jwks
          - file:///home/ory/jwks.json # ONLY FOR DEV, DO NOT USE IN PRODUCTION
        token_from:
          header: Appcheck
  authorizer:
    handler: allow
  mutators:
    - handler: noop

- id: galoy-ws
  upstream:
    url: "http://bats-tests:4000/graphql"
    strip_path: /graphqlws # ONLY FOR DEV, in prod should resolve to /graphql, like ws.blink.sv/graphql
  match:
    url: "<(http|https)>://<[a-zA-Z0-9-.:]+>/graphqlws" # ONLY FOR DEV, in prod should resolve to /graphql
    methods: ["POST", "GET"]
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

- id: galoy-backend
  upstream:
    url: "http://apollo-router:4004"
  match:
    url: "<(http|https)>://<[a-zA-Z0-9-.:]+>/graphql"
    methods: ["POST", "GET", "OPTIONS"]
  authenticators:
    - handler: cookie_session
      config:
        check_session_url: http://kratos:4433/sessions/whoami
        preserve_path: true
        preserve_query: true
        subject_from: identity.id
        extra_from: "@this"
    - handler: bearer_token
      config:
        check_session_url: http://kratos:4433/sessions/whoami
        preserve_path: true
        preserve_query: true
        subject_from: identity.id
        extra_from: "@this"
    # FIP-07 API keys: fk_… in the X-API-KEY header, verified by the
    # backend's cluster-internal check endpoint. Response mimics kratos
    # whoami, so subject_from/extra_from stay identical. An invalid key
    # gets an explicit 401 (like a bad kratos token); requests without
    # X-API-KEY skip this authenticator entirely.
    - handler: bearer_token
      config:
        check_session_url: http://bats-tests:4012/auth/api-key/check
        token_from:
          header: X-API-KEY
        forward_http_headers:
          - X-API-KEY
          # X-Real-Ip is ingress-set in prod (trustworthy) but client-controlled in dev proxy mode
          - X-Real-Ip
        force_method: GET
        preserve_path: true
        preserve_query: true
        subject_from: identity.id
        extra_from: "@this"
    - handler: anonymous
  authorizer:
    handler: allow
  mutators:
    - handler: id_token
      config:
        claims: '{"sub": "{{ print .Subject }}", "session_id": "{{ print .Extra.id }}", "expires_at": "{{ print .Extra.expires_at }}"{{ if .Extra.scope }}, "scope": "{{ print .Extra.scope }}"{{ end }}{{ if .Extra.rate_limit }}, "rate_limit": {{ print .Extra.rate_limit }}{{ end }} }'
