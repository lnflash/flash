name: "Generate GraphQL Docs"

concurrency: ${{ github.workflow }}

# Generates the GraphQL API reference (spectaql, from the checked-in public
# SDL) and publishes it into lnflash/flash-docs at static/api-reference/,
# which DigitalOcean App Platform serves at docs.flashapp.me/api-reference.
# Auth: FLASH_DOCS_DEPLOY_KEY secret = private half of a write deploy key
# installed on lnflash/flash-docs.
on:
  push:
    branches: [main]
    paths:
      - "src/graphql/**"
      - "spectaql/**"
      - ".github/workflows/generate-graphql-docs.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: main
      - uses: actions/checkout@v4
        with:
          repository: lnflash/flash-docs
          ssh-key: ${{ secrets.FLASH_DOCS_DEPLOY_KEY }}
          path: docs-site
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: yarn install --frozen-lockfile
        working-directory: main
      - uses: vmware-tanzu/carvel-setup-action@v2
        with:
          only: ytt
      - run: ytt -f spectaql/TUTORIAL.md -f spectaql/spectaql-config-template.yml > spectaql-config.yml
        working-directory: main
      - name: Build docs
        run: yarn run build-docs
        working-directory: main
      - name: Stage into docs site
        run: |
          mkdir -p docs-site/static/api-reference
          cp main/public/index.html docs-site/static/api-reference/index.html
          cp main/public/logo.png docs-site/static/api-reference/logo.png
      - name: Publish to flash-docs
        working-directory: docs-site
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add static/api-reference
          if git diff --cached --quiet; then
            echo "API reference unchanged — nothing to publish"
          else
            git commit -m "docs(api-reference): regenerate from lnflash/flash@$GITHUB_SHA"
            git push
          fi
