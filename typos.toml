files.extend-exclude = [
  "dev",
  "src/domain/users/languages.ts",
  "src/services/loopd/protos",
  "docs/postman-collection/galoy_graphql_main_api.postman_collection.json",
  "docker-compose.yml",
  "quickstart/*.yml"
]

default.extend-ignore-identifiers-re = [
  "^bc1\\w+",
  "^lnbc1\\w+",
]

default.extend-ignore-re = ["\"eyJ[a-zA-Z0-9_\\-\\.]+\""]

[default.extend-words]
# returned from twilio API referenced in src/debug/text-sms.ts
Ons = "Ons"
Lsat = "Lsat"
# Bridge API payment rail token
bre = "bre"
# MongoDB query operator
nin = "nin"
# Existing money quiz identifiers; changing them would be a cross-client data change.
Governement = "Governement"
Aggrement = "Aggrement"
